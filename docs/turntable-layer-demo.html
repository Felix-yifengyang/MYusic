<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MYusic Turntable Layer Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f11;
      --text: #f3f0e8;
      --muted: #9da6ad;
      --accent: #d8a651;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(216, 166, 81, .16), transparent 34%),
        linear-gradient(180deg, #171410, var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .demo {
      display: grid;
      gap: 18px;
      width: min(1120px, calc(100vw - 32px));
      justify-items: center;
    }

    .stage {
      position: relative;
      width: min(980px, 100%);
      aspect-ratio: 980 / 760;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .05), transparent 24%),
        linear-gradient(90deg, rgba(0, 0, 0, .14), transparent 28%, rgba(255, 255, 255, .04) 52%, transparent 74%),
        #2b1a10;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .46);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(255, 225, 180, .04) 0 1px, transparent 1px 28px),
        linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, .22));
      pointer-events: none;
    }

    .turntable {
      position: absolute;
      top: 54px;
      left: 50%;
      width: min(620px, 72%);
      aspect-ratio: 1;
      transform: translateX(-50%);
    }

    .turntable-body,
    .record-clip,
    .tonearm {
      position: absolute;
      user-select: none;
      -webkit-user-drag: none;
    }

    .turntable-body {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    .record-clip {
      top: 18%;
      left: 18%;
      z-index: 2;
      width: 58%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 50%;
      transform-origin: 50% 50%;
    }

    .record {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: 50% 50%;
    }

    .is-playing .record {
      animation: spin 4.8s linear infinite;
    }

    .cover {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 1;
      width: 18%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        linear-gradient(135deg, #ba6d4f, #d8a651 48%, #284447);
      box-shadow:
        inset 0 0 0 2px rgba(255, 237, 198, .18),
        0 0 0 1px rgba(0, 0, 0, .28);
      transform: translate(-50%, -50%);
      transform-origin: 50% 50%;
    }

    .is-playing .cover {
      animation: spin 4.8s linear infinite;
    }

    .tonearm {
      top: 14%;
      left: 62%;
      z-index: 4;
      width: 31%;
      height: auto;
      object-fit: contain;
      transform: rotate(-20deg);
      transform-origin: 88% 18%;
      transition: transform .5s cubic-bezier(.2, .9, .2, 1);
    }

    .is-arm-down .tonearm {
      transform: rotate(0deg);
    }

    .progress {
      position: absolute;
      right: 12%;
      bottom: 58px;
      left: 12%;
      z-index: 5;
      height: 124px;
    }

    .progress-track {
      position: absolute;
      inset: auto 0 0;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .progress-thumb {
      position: absolute;
      bottom: 12px;
      left: calc(var(--progress, .34) * 100%);
      width: 42px;
      height: auto;
      transform: translateX(-50%);
      transition: left .35s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button {
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .09), rgba(255, 255, 255, .02)),
        #171a1e;
      color: var(--text);
      cursor: pointer;
      padding: 0 15px;
    }

    button:hover {
      border-color: rgba(216, 166, 81, .46);
    }

    .note {
      max-width: 820px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .version {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 8;
      border: 1px solid rgba(216, 166, 81, .4);
      border-radius: 999px;
      background: rgba(13, 15, 17, .72);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      padding: 6px 10px;
      pointer-events: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 700px) {
      .stage {
        aspect-ratio: 760 / 760;
      }

      .turntable {
        top: 82px;
        width: 92%;
      }

      .progress {
        right: 5%;
        bottom: 64px;
        left: 5%;
      }

      .progress-thumb {
        width: 42px;
      }
    }
  </style>
</head>
<body>
  <main class="demo">
    <section class="stage is-playing is-arm-down" id="stage" style="--progress: .34">
      <span class="version">topdown centered record</span>
      <div class="turntable">
        <img class="turntable-body" src="../apps/web/src/assets/room/turntable-body-topdown-pixel.png?v=3" alt="" />
        <div class="record-clip">
          <img class="record" src="../apps/web/src/assets/room/record-disc-topdown-pixel-centered.png?v=4" alt="" />
          <span class="cover" aria-hidden="true"></span>
        </div>
        <img class="tonearm" src="../apps/web/src/assets/room/tonearm-moving-topdown-pixel.png?v=3" alt="" />
      </div>

      <div class="progress">
        <img class="progress-track" src="../apps/web/src/assets/room/wood-progress-track-topdown-pixel.png?v=3" alt="" />
        <img class="progress-thumb" src="../apps/web/src/assets/room/wood-progress-thumb-topdown-pixel.png?v=3" alt="" />
      </div>
    </section>

    <div class="controls">
      <button type="button" id="playToggle">Pause record</button>
      <button type="button" id="armToggle">Lift arm</button>
      <button type="button" id="progressToggle">Move progress</button>
    </div>

    <p class="note">
      Layer demo only: body, record, tonearm, progress track, and progress thumb are separate assets.
      The record/cover rotate together; the arm pivots independently.
    </p>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const playToggle = document.getElementById("playToggle");
    const armToggle = document.getElementById("armToggle");
    const progressToggle = document.getElementById("progressToggle");
    let progress = 0.34;

    playToggle.addEventListener("click", () => {
      const playing = stage.classList.toggle("is-playing");
      playToggle.textContent = playing ? "Pause record" : "Spin record";
    });

    armToggle.addEventListener("click", () => {
      const down = stage.classList.toggle("is-arm-down");
      armToggle.textContent = down ? "Lift arm" : "Lower arm";
    });

    progressToggle.addEventListener("click", () => {
      progress = progress > 0.72 ? 0.16 : progress + 0.22;
      stage.style.setProperty("--progress", progress.toFixed(2));
    });
  </script>
</body>
</html>
