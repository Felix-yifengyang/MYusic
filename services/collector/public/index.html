<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Collector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: #181d21;
      --line: #303941;
      --text: #f1f4f5;
      --muted: #9facb5;
      --accent: #2f9b74;
      --accent-hover: #37ad82;
      --danger: #d66b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(820px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .health {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      text-align: right;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    input, button {
      min-height: 46px;
      border-radius: 8px;
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #151a1e;
      color: var(--text);
      padding: 0 13px;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 650;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: .65; cursor: not-allowed; }

    .error {
      display: none;
      margin: 0 0 14px;
      color: var(--danger);
    }

    .jobs {
      display: grid;
      gap: 12px;
    }

    .job {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 13px;
    }

    .job-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .status {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
    }

    .status.failed { color: var(--danger); }
    .status.done { color: #6fd29d; }
    .status.running { color: #f0bf68; }

    .url {
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 13px;
    }

    pre {
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 10px 0 0;
      color: #c1cbd1;
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 620px) {
      header { display: block; }
      .health { text-align: left; margin-top: 8px; }
      form { grid-template-columns: 1fr; }
      button { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Music Collector</h1>
      <div class="health" id="health">Checking...</div>
    </header>

    <form id="download-form">
      <input id="url" type="url" placeholder="粘贴 Bilibili / YouTube / 网页链接" autocomplete="off" required />
      <button id="submit" type="submit">下载音频</button>
    </form>

    <p class="error" id="error"></p>

    <section class="jobs" id="jobs"></section>
  </main>

  <script>
    const form = document.querySelector("#download-form");
    const input = document.querySelector("#url");
    const submit = document.querySelector("#submit");
    const errorEl = document.querySelector("#error");
    const jobsEl = document.querySelector("#jobs");
    const healthEl = document.querySelector("#health");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = input.value.trim();
      if (!url) return;

      submit.disabled = true;
      showError("");

      try {
        const response = await fetch("/api/download", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ url })
        });
        const body = await response.json();
        if (!response.ok) throw new Error(body.error || "Download failed");
        input.value = "";
        await loadJobs();
      } catch (error) {
        showError(error.message);
      } finally {
        submit.disabled = false;
        input.focus();
      }
    });

    async function loadHealth() {
      try {
        const response = await fetch("/api/health");
        const body = await response.json();
        healthEl.textContent = body.musicDir;
      } catch {
        healthEl.textContent = "Service unavailable";
      }
    }

    async function loadJobs() {
      try {
        const response = await fetch("/api/jobs");
        const jobs = await response.json();
        if (!jobs.length) {
          jobsEl.innerHTML = '<div class="empty">暂无下载任务</div>';
          return;
        }
        jobsEl.innerHTML = jobs.map(renderJob).join("");
      } catch (error) {
        showError(error.message);
      }
    }

    function renderJob(job) {
      return `
        <article class="job">
          <div class="job-top">
            <span class="status ${escapeHtml(job.status)}">${escapeHtml(job.status)}</span>
            <span>${escapeHtml(formatDate(job.createdAt))}</span>
          </div>
          <div class="url">${escapeHtml(job.url)}</div>
          ${job.error ? `<pre>${escapeHtml(job.error)}</pre>` : ""}
          ${job.output ? `<pre>${escapeHtml(job.output)}</pre>` : ""}
        </article>`;
    }

    function formatDate(value) {
      if (!value) return "";
      return new Date(value).toLocaleString();
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = message ? "block" : "none";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }

    loadHealth();
    loadJobs();
    setInterval(loadJobs, 2000);
  </script>
</body>
</html>
