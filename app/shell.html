<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Music</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --bar: #171c20;
      --line: #303941;
      --text: #f1f4f5;
      --muted: #9facb5;
      --accent: #2f9b74;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--bar);
      padding: 0 14px;
    }

    .brand {
      font-weight: 750;
      font-size: 15px;
      white-space: nowrap;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button {
      height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      color: var(--text);
      border-color: var(--line);
    }

    button.active {
      color: #fff;
      background: var(--accent);
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    main {
      position: relative;
      min-height: 0;
    }

    webview,
    .settings {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    webview {
      background: #fff;
    }

    webview[hidden],
    .settings[hidden] {
      display: none;
    }

    .settings {
      overflow: auto;
      padding: 22px;
      background: var(--bg);
    }

    .settings-inner {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bar);
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      border: 1px solid #273038;
      border-radius: 8px;
      background: #12171b;
      padding: 10px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .value {
      overflow-wrap: anywhere;
      line-height: 1.45;
      font-size: 14px;
    }

    .ok { color: #65d595; }
    .bad { color: #e48686; }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .actions button {
      border-color: var(--line);
      background: #12171b;
      color: var(--text);
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      header { gap: 8px; }
      .brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">Personal Music</div>
      <nav aria-label="主导航">
        <button class="active" data-view="collector" type="button">下载</button>
        <button data-view="library" type="button">音乐库</button>
        <button data-view="settings" type="button">设置</button>
      </nav>
      <div class="status" id="status">本地服务已启动</div>
    </header>

    <main>
      <webview id="collector"></webview>
      <webview id="library" hidden></webview>
      <section class="settings" id="settings" hidden>
        <div class="settings-inner">
          <section class="section">
            <h2>状态</h2>
            <div class="grid">
              <div class="item">
                <div class="label">下载服务</div>
                <div class="value" id="collector-status">-</div>
              </div>
              <div class="item">
                <div class="label">音乐服务</div>
                <div class="value" id="navidrome-status">-</div>
              </div>
              <div class="item">
                <div class="label">Bilibili Cookie</div>
                <div class="value" id="cookie-status">-</div>
              </div>
              <div class="item">
                <div class="label">iPhone 连接地址</div>
                <div class="value" id="iphone-url">-</div>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>路径</h2>
            <div class="grid">
              <div class="item">
                <div class="label">数据目录</div>
                <div class="value" id="data-dir">-</div>
              </div>
              <div class="item">
                <div class="label">音乐库</div>
                <div class="value" id="library-dir">-</div>
              </div>
              <div class="item">
                <div class="label">Cookie 文件</div>
                <div class="value" id="cookie-file">-</div>
              </div>
              <div class="item">
                <div class="label">日志文件</div>
                <div class="value" id="log-file">-</div>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>操作</h2>
            <div class="actions">
              <button data-action="open" data-target="dataRootDir" type="button">打开数据目录</button>
              <button data-action="open" data-target="libraryDir" type="button">打开音乐库</button>
              <button data-action="open" data-target="cookiesDir" type="button">打开 Cookie 目录</button>
              <button data-action="open" data-target="logPath" type="button">打开日志</button>
              <button data-action="copy-iphone" type="button">复制 iPhone 地址</button>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const buttons = Array.from(document.querySelectorAll("button[data-view]"));
    const views = {
      collector: document.querySelector("#collector"),
      library: document.querySelector("#library"),
      settings: document.querySelector("#settings")
    };
    const statusEl = document.querySelector("#status");
    const urls = {
      collector: "http://127.0.0.1:8787",
      library: "http://127.0.0.1:4533"
    };

    for (const button of buttons) {
      button.addEventListener("click", () => {
        const target = button.dataset.view;
        for (const item of buttons) {
          item.classList.toggle("active", item === button);
        }
        for (const [name, view] of Object.entries(views)) {
          view.hidden = name !== target;
        }
      });
    }

    for (const [name, view] of Object.entries(views)) {
      view.addEventListener("did-fail-load", (event) => {
        if (!view.tagName || view.tagName.toLowerCase() !== "webview") return;
        if (event.errorCode !== -3) {
          statusEl.textContent = `${name === "collector" ? "下载" : "音乐库"}加载失败：${event.errorDescription}`;
        }
      });

      view.addEventListener("did-finish-load", () => {
        if (!view.tagName || view.tagName.toLowerCase() !== "webview") return;
        statusEl.textContent = "本地服务已启动";
      });
    }

    function renderBool(element, value) {
      element.textContent = value ? "运行中" : "未运行";
      element.className = `value ${value ? "ok" : "bad"}`;
    }

    async function loadSettings() {
      if (!window.personalMusic) return;
      const data = await window.personalMusic.getStatus();
      renderBool(document.querySelector("#collector-status"), data.collectorReady);
      renderBool(document.querySelector("#navidrome-status"), data.navidromeReady);

      const cookieStatus = document.querySelector("#cookie-status");
      cookieStatus.textContent = data.exists.bilibiliCookies ? "已配置" : "未配置";
      cookieStatus.className = `value ${data.exists.bilibiliCookies ? "ok" : "bad"}`;

      document.querySelector("#iphone-url").textContent = data.iphoneUrl;
      document.querySelector("#data-dir").textContent = data.paths.dataRootDir;
      document.querySelector("#library-dir").textContent = data.paths.libraryDir;
      document.querySelector("#cookie-file").textContent = data.paths.bilibiliCookiesPath;
      document.querySelector("#log-file").textContent = data.paths.logPath;
    }

    document.querySelector(".settings").addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button || !window.personalMusic) return;

      if (button.dataset.action === "open") {
        await window.personalMusic.openPath(button.dataset.target);
        return;
      }

      if (button.dataset.action === "copy-iphone") {
        const text = document.querySelector("#iphone-url").textContent;
        await window.personalMusic.copyText(text);
        statusEl.textContent = "已复制 iPhone 地址";
      }
    });

    async function waitFor(url) {
      for (let attempt = 1; attempt <= 60; attempt += 1) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (response.ok || response.status < 500) return true;
        } catch {
          statusEl.textContent = `等待本地服务... ${attempt}/60`;
        }
        await new Promise((resolve) => setTimeout(resolve, 500));
      }
      return false;
    }

    async function boot() {
      const collectorReady = await waitFor(`${urls.collector}/api/health`);
      const libraryReady = await waitFor(urls.library);

      if (!collectorReady) {
        statusEl.textContent = "下载服务未响应";
        return;
      }

      views.collector.src = urls.collector;
      if (libraryReady) {
        views.library.src = urls.library;
      } else {
        statusEl.textContent = "音乐库服务未响应";
      }

      await loadSettings();
      setInterval(loadSettings, 5000);
    }

    boot();
  </script>
</body>
</html>
