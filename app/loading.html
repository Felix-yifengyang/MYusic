<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Music</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: #181d21;
      --line: #303941;
      --text: #f1f4f5;
      --muted: #9facb5;
      --accent: #2f9b74;
      --danger: #d66b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .error {
      color: var(--danger);
    }

    .bar {
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      margin-top: 18px;
      background: #232b31;
    }

    .bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: move 1.2s ease-in-out infinite alternate;
    }

    @keyframes move {
      from { transform: translateX(0); }
      to { transform: translateX(140%); }
    }
  </style>
</head>
<body>
  <main>
    <h1>Personal Music</h1>
    <p id="status">正在启动本地音乐服务...</p>
    <div class="bar" aria-hidden="true"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const collectorUrl = "http://127.0.0.1:8787";

    if (error) {
      const status = document.querySelector("#status");
      status.className = "error";
      status.textContent = `启动失败：${decodeURIComponent(error)}`;
    }

    async function waitForCollector() {
      if (error) return;

      const status = document.querySelector("#status");
      for (let attempt = 1; attempt <= 90; attempt += 1) {
        try {
          const response = await fetch(`${collectorUrl}/api/health`, { cache: "no-store" });
          if (response.ok) {
            window.location.replace(collectorUrl);
            return;
          }
        } catch {
          status.textContent = `正在启动本地音乐服务... ${attempt}/90`;
        }

        await new Promise((resolve) => setTimeout(resolve, 1000));
      }

      status.className = "error";
      status.textContent = "启动超时，请关闭后重新打开，或检查 8787/4533 端口是否被占用。";
    }

    waitForCollector();
  </script>
</body>
</html>
